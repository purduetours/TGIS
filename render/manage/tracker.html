<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Tracker | TGIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        'primary-gold': '#CFB991',
                        'text-dark': '#374151',
                        'status-green': '#10B981',
                        'tgis-blue': '#1D4ED8',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased">

<div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-primary-gold border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-text-dark">Loading Tour Stats...</p>
</div>

<div class="max-w-7xl mx-auto p-4 sm:p-8">
    <header class="mb-10">
        <p class="text-xs font-black text-primary-gold uppercase tracking-widest">Purdue University</p>
        <h1 class="text-3xl font-black text-text-dark">Tour Tracker Performance</h1>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-center">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Career Total</p>
            <h2 id="career-total" class="text-6xl font-black text-text-dark">--</h2>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-status-green/30 text-center">
            <p id="sem-label" class="text-xs font-bold text-status-green uppercase tracking-widest mb-2">Current Semester</p>
            <h2 id="sem-total" class="text-6xl font-black text-status-green">--</h2>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-center">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Global Rank</p>
            <h2 id="user-rank" class="text-6xl font-black text-tgis-blue">--</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100">
            <h3 class="text-xl font-black text-text-dark mb-6 flex items-center">
                <span class="mr-2">🏆</span> Top 10 Guides
            </h3>
            <div id="leaderboard-container" class="space-y-3">
                </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100">
            <h3 class="text-xl font-black text-text-dark mb-6">Semester History</h3>
            <div id="history-container" class="space-y-4">
                </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbytBDIlv8pB_SVEJy4cFic8kHw_E6iRCzDpWFmWZeQRseDOeQgtk1LPT0t6CHDkIdq0/exec';
    const userName = new URLSearchParams(window.location.search).get('user');

    async function init() {
        if(!userName) return;
        try {
            const res = await fetch(`${scriptURL}?user=${userName}`);
            const data = await res.json();

            // Populate Cards
            document.getElementById('career-total').innerText = data.stats.careerTotal;
            document.getElementById('sem-total').innerText = data.stats.semesterTotal;
            document.getElementById('sem-label').innerText = data.currentSemesterName;
            document.getElementById('user-rank').innerText = `#${data.rank}`;

            // Build Leaderboard
            const lbContainer = document.getElementById('leaderboard-container');
            lbContainer.innerHTML = data.leaderboard.map((entry, i) => `
                <div class="flex items-center justify-between p-4 rounded-2xl ${entry.displayName === data.profile.displayName ? 'bg-primary-gold/20 ring-2 ring-primary-gold' : 'bg-gray-50'}">
                    <div class="flex items-center space-x-4">
                        <span class="font-black text-gray-400 w-6">#${i+1}</span>
                        <span class="font-bold text-text-dark">${entry.displayName}</span>
                    </div>
                    <span class="font-black text-text-dark">${entry.careerTotal}</span>
                </div>
            `).join('');

            // Build History
            const histContainer = document.getElementById('history-container');
            histContainer.innerHTML = data.stats.history.reverse().map(h => `
                <div class="flex items-center">
                    <div class="w-32 text-xs font-bold text-gray-500 uppercase">${h.semester}</div>
                    <div class="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-primary-gold" style="width: ${Math.min((h.count / 50) * 100, 100)}%"></div>
                    </div>
                    <div class="w-10 text-right font-black text-text-dark ml-4">${h.count}</div>
                </div>
            `).join('');

            document.getElementById('loading-overlay').style.display = 'none';
        } catch (e) {
            console.error(e);
        }
    }

    init();
</script>
</body>
</html>
