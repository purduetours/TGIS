<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Guide Information System - Purdue Admissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'], 
                    },
                    colors: {
                        'primary-gold': '#CFB991', 
                        'primary-black': '#212121', 
                        'primary-gold-dark': '#B8A17D', 
                        'text-dark': '#374151', 
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        
        body {
            background-image: url('https://www.purdue.edu/hr/workremotely/images/FoundersPark.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            overflow-x: hidden;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        @keyframes wobble {
            0%, 100% { margin-left: 0; }
            50% { margin-left: 20px; }
        }

        .snowflake {
            color: #fff;
            font-size: 1em;
            position: fixed;
            top: -10vh;
            z-index: 1000;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite, wobble ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col antialiased">
    <div id="snow-container" class="absolute inset-0"></div>

    <div class="absolute inset-0 bg-primary-black opacity-20"></div>

    <main class="flex-grow flex items-center justify-center p-4 relative z-10">
        <div class="max-w-xl w-full bg-white bg-opacity-65 backdrop-blur-md shadow-2xl rounded-xl overflow-hidden p-6 sm:p-8 text-center border-t-8 border-primary-gold">
            <img src="PU-H-Full-RGB.png" 
                 alt="Purdue University Logo" 
                 class="h-20 w-auto mx-auto mb-8">

            <h1 class="text-3xl sm:text-4xl font-extrabold text-text-dark mb-8 leading-snug border-t pt-6 border-gray-200">
                Tour Guide <span class="text-primary-black">Information System</span>
            </h1>

            <div class="flex flex-col items-center space-y-4">
                <form action="https://purdue.ca1.qualtrics.com/jfe/form/SV_aXWKLeeEHUPPjgi" method="POST" class="w-full sm:w-auto">
                    <button type="submit"
                        class="inline-flex items-center justify-center w-full px-10 py-3 bg-primary-black text-white font-extrabold text-lg rounded-lg shadow-xl hover:bg-gray-800 transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-primary-black/50">
                        <span>Sign In with SSO</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </form>

                <button class="w-full sm:w-auto px-10 py-2 border-2 border-primary-black text-primary-black font-bold text-md rounded-lg hover:bg-gray-100 transition duration-200 ease-in-out">
                    Guest Login
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-200">
                <p class="text-sm text-gray-500 font-medium">
                    Please contact Jacob if your TGIS Profile is not established.
                </p>
            </div>
        </div>
    </main>

    <script>
        const snowContainer = document.getElementById('snow-container');
        const numSnowflakes = 50;
        const snowflakeCharacters = ['\u2744', '\u2745', '\u2746'];

        function generateSnowflakes() {
            for (let i = 0; i < numSnowflakes; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.textContent = snowflakeCharacters[Math.floor(Math.random() * snowflakeCharacters.length)];
                snowflake.style.left = `${Math.random() * 100}vw`;
                const fallDuration = 5 + Math.random() * 15;
                const wobbleDuration = 2 + Math.random() * 5;
                snowflake.style.animationDuration = `${fallDuration}s, ${wobbleDuration}s`;
                snowflake.style.animationDelay = `-${Math.random() * 20}s`;
                snowflake.style.fontSize = `${0.8 + Math.random() * 0.8}em`;
                snowContainer.appendChild(snowflake);
            }
        }
        // Uncomment the line below to turn the snow back on
        // generateSnowflakes();
    </script>
</body>
</html>
