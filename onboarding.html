<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS | Account Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .input-group label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #9CA3AF; margin-bottom: 6px; display: block; margin-left: 4px; }
        .input-style { width: 100%; background: white; border: 1px solid #E5E7EB; border-radius: 1.25rem; padding: 1rem 1.25rem; font-weight: 600; transition: all 0.2s; appearance: none; }
        .input-style:focus { outline: none; border-color: #CFB991; box-shadow: 0 0 0 4px rgba(207, 185, 145, 0.1); }
        select[multiple] { height: 160px; padding: 10px; }
        .loading-dots::after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <div id="status-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center flex-col">
        <div id="loader-icon" class="w-12 h-12 border-4 border-gray-100 border-t-[#CFB991] rounded-full animate-spin mb-4"></div>
        <p id="status-message" class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 loading-dots">Validating Identity</p>
    </div>

    <div id="main-card" class="hidden max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-gray-100">
        <header class="mb-10">
            <div class="flex items-center gap-2 mb-2">
                <span class="h-1 w-8 bg-[#CFB991] rounded-full"></span>
                <p class="text-[#CFB991] font-black uppercase tracking-widest text-[10px]">Onboarding Portal</p>
            </div>
            <h1 id="user-display-name" class="text-5xl font-black tracking-tighter uppercase italic leading-none mb-4">Tour Guide</h1>
            <p class="text-gray-400 font-bold text-sm uppercase tracking-widest leading-relaxed">Complete the secure fields below to activate your account.</p>
        </header>

        <form id="onboardingForm" class="space-y-6">
            <input type="hidden" name="email" id="hidden-email">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>PUID (Secure ID)</label>
                    <input type="password" name="puid" required placeholder="•••••••••" class="input-style">
                </div>
                <div class="input-group">
                    <label>Verified Email</label>
                    <input type="email" id="display-email" class="input-style bg-gray-50 text-gray-400 cursor-not-allowed" readonly>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Birthday</label>
                    <input type="date" name="birthday" required class="input-style">
                </div>
                <div class="input-group">
                    <label>Hometown</label>
                    <input type="text" name="hometown" required placeholder="City, State" class="input-style">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Expected Graduation</label>
                    <select name="gradSemester" id="gradSemester" required class="input-style"></select>
                </div>
                <div class="input-group">
                    <label>Classification</label>
                    <select name="year" required class="input-style">
                        <option value="Freshman">Freshman</option>
                        <option value="Sophomore">Sophomore</option>
                        <option value="Junior">Junior</option>
                        <option value="Senior">Senior</option>
                        <option value="5th Year/Grad">5th Year/Grad</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>College (Select all that apply)</label>
                <select name="college" multiple required class="input-style">
                    <option value="Agriculture">Agriculture</option>
                    <option value="Education">Education</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Health and Human Sciences">Health and Human Sciences</option>
                    <option value="Liberal Arts">Liberal Arts</option>
                    <option value="Management">Management</option>
                    <option value="Pharmacy">Pharmacy</option>
                    <option value="Polytechnic">Polytechnic</option>
                    <option value="Science">Science</option>
                    <option value="Veterinary Medicine">Veterinary Medicine</option>
                    <option value="Exploratory Studies">Exploratory Studies</option>
                    <option value="Honors College">Honors College</option>
                    <option value="Graduate School">Graduate School</option>
                </select>
            </div>

            <div class="input-group">
                <label>Major</label>
                <input type="text" name="major" required placeholder="Major" class="input-style">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Minor (Optional)</label>
                    <input type="text" name="minor" class="input-style">
                </div>
                <div class="input-group">
                    <label>Certificate (Optional)</label>
                    <input type="text" name="certificate" class="input-style">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-black text-white font-black py-6 rounded-[2rem] shadow-xl hover:bg-gray-900 transition-all mt-4 uppercase tracking-[0.2em] text-xs">
                Activate My Account
            </button>
        </form>
    </div>

    <script>
        // CONFIG - CHANGE THESE
        const ONBOARDING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRoQVbW5Bi_Or35VwZw-9cxQq6A_woUSmegpCqj4j2iG31l27OOKICBmCXsUCyB_pN/exec';
        const MAIN_APP_URL = 'https://purduetours.github.io/TGIS/app.html';
        const SCHOOL_DOMAIN = "@purdue.edu"; 

        const params = new URLSearchParams(window.location.search);
        const username = params.get('user');
        const fullEmail = username ? (username.includes('@') ? username : username + SCHOOL_DOMAIN) : null;

        window.onload = async () => {
            if (!username) {
                document.getElementById('status-message').innerText = "URL Error: Missing ?user=";
                document.getElementById('loader-icon').style.display = 'none';
                return;
            }

            // Populate Grad Select
            const gradSelect = document.getElementById('gradSemester');
            const years = [2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031];
            const terms = ['Spring', 'Summer', 'Winter'];
            years.forEach(y => { terms.forEach(t => {
                let opt = document.createElement('option');
                opt.value = `${t} ${y}`; opt.innerText = `${t} ${y}`;
                gradSelect.appendChild(opt);
            })});

            try {
                // FETCH DATA
                const response = await fetch(`${ONBOARDING_SCRIPT_URL}?action=getName&email=${encodeURIComponent(fullEmail)}`);
                const data = await response.json();

                if (data.name) {
                    document.getElementById('user-display-name').innerText = data.name;
                    document.getElementById('display-email').value = fullEmail;
                    document.getElementById('hidden-email').value = fullEmail;
                    
                    document.getElementById('status-overlay').style.display = 'none';
                    document.getElementById('main-card').classList.remove('hidden');
                } else {
                    document.getElementById('status-message').innerText = "User not found in system.";
                    document.getElementById('loader-icon').style.display = 'none';
                }
            } catch (err) {
                document.getElementById('status-message').innerText = "Connection Error: Check Deployment Permissions";
                document.getElementById('loader-icon').style.display = 'none';
            }
        };

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "ACTIVATING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const colleges = Array.from(e.target.college.selectedOptions).map(o => o.value);
            data.college = colleges.join(', ');

            try {
                await fetch(ONBOARDING_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Critical
                    body: JSON.stringify(data)
                });
                
                btn.innerText = "SUCCESS! REDIRECTING...";
                setTimeout(() => {
                    window.location.href = `${MAIN_APP_URL}?user=${username}`;
                }, 1500);
            } catch (err) {
                alert("Submit error. Please try again.");
                btn.innerText = "ACTIVATE MY ACCOUNT";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
