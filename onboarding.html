<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS | Account Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .input-group label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #9CA3AF; margin-bottom: 6px; display: block; margin-left: 4px; }
        .input-style { width: 100%; background: white; border: 1px solid #E5E7EB; border-radius: 1.25rem; padding: 1rem 1.25rem; font-weight: 600; transition: all 0.2s; }
        .input-style:focus { outline: none; border-color: #CFB991; ring: 2px; ring-color: #CFB991; }
        select[multiple] { height: 120px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="loading-state" class="text-center font-black uppercase tracking-widest text-gray-400">Identifying User...</div>

    <div id="main-card" class="hidden max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-gray-100">
        <header class="mb-10">
            <p id="welcome-text" class="text-[#CFB991] font-black uppercase tracking-widest text-xs mb-2">Welcome Back,</p>
            <h1 id="user-display-name" class="text-5xl font-black tracking-tighter uppercase italic leading-none">Tour Guide</h1>
            <p class="text-gray-400 font-bold text-sm mt-4 uppercase tracking-widest">Complete your secure profile registration</p>
        </header>

        <form id="onboardingForm" class="space-y-6">
            <input type="hidden" name="email" id="hidden-email">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>PUID (Secure)</label>
                    <input type="password" name="puid" required placeholder="•••••••••" class="input-style">
                </div>
                <div class="input-group">
                    <label>Confirm Email</label>
                    <input type="email" name="confirmEmail" id="display-email" required class="input-style bg-gray-50" readonly>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Birthday</label>
                    <input type="date" name="birthday" required class="input-style">
                </div>
                <div class="input-group">
                    <label>Hometown</label>
                    <input type="text" name="hometown" required placeholder="City, State" class="input-style">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Expected Graduation</label>
                    <select name="gradSemester" id="gradSemester" required class="input-style"></select>
                </div>
                <div class="input-group">
                    <label>Classification</label>
                    <select name="year" required class="input-style">
                        <option value="Freshman">Freshman</option>
                        <option value="Sophomore">Sophomore</option>
                        <option value="Junior">Junior</option>
                        <option value="Senior">Senior</option>
                        <option value="5th Year/Grad">5th Year/Grad</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>College (Select all that apply - Cmd/Ctrl + Click)</label>
                <select name="college" multiple required class="input-style py-2">
                    <option value="Agriculture">Agriculture</option>
                    <option value="Education">Education</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Health and Human Sciences">Health and Human Sciences</option>
                    <option value="Liberal Arts">Liberal Arts</option>
                    <option value="Management">Management</option>
                    <option value="Pharmacy">Pharmacy</option>
                    <option value="Polytechnic">Polytechnic</option>
                    <option value="Science">Science</option>
                    <option value="Veterinary Medicine">Veterinary Medicine</option>
                    <option value="Exploratory Studies">Exploratory Studies</option>
                    <option value="Honors College">Honors College</option>
                    <option value="Graduate School">Graduate School</option>
                </select>
            </div>

            <div class="input-group">
                <label>Major</label>
                <input type="text" name="major" required placeholder="e.g. Mechanical Engineering" class="input-style">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Minor (Optional)</label>
                    <input type="text" name="minor" class="input-style">
                </div>
                <div class="input-group">
                    <label>Certificate (Optional)</label>
                    <input type="text" name="certificate" class="input-style">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-black text-white font-black py-5 rounded-[2rem] shadow-xl hover:scale-[1.02] transition-all mt-4 uppercase tracking-widest text-sm">
                Finalize My Account
            </button>
        </form>
    </div>

    <script>
        const ONBOARDING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxox6gDqjOyP42tk-PtLjDw9P5ncGi-f-c-PYLIcUq4ZT5UhWnfvlgDUk867KBirQyN/exec';
        const params = new URLSearchParams(window.location.search);
        const email = params.get('user');

        // Initialize Page
        window.onload = async () => {
            // 1. Generate Grad Date Options
            const gradSelect = document.getElementById('gradSemester');
            const years = [2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031];
            const terms = ['Spring', 'Summer', 'Winter'];
            years.forEach(y => {
                terms.forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = `${t} ${y}`;
                    opt.innerText = `${t} ${y}`;
                    gradSelect.appendChild(opt);
                });
            });

            // 2. Fetch Name from Script
            try {
                const resp = await fetch(`${ONBOARDING_SCRIPT_URL}?action=getName&email=${email}`);
                const data = await resp.json();
                if(data.name) {
                    document.getElementById('user-display-name').innerText = data.name;
                    document.getElementById('display-email').value = email;
                    document.getElementById('hidden-email').value = email;
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('main-card').classList.remove('hidden');
                } else {
                    document.getElementById('loading-state').innerText = "User not found in system.";
                }
            } catch(e) {
                document.getElementById('loading-state').innerText = "Connection Error.";
            }
        };

        // Handle Submit
        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "SAVING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Handle Multiple Select for College
            const colleges = Array.from(e.target.college.selectedOptions).map(o => o.value);
            data.college = colleges.join(', ');

            try {
                await fetch(ONBOARDING_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("Account created! Redirecting...");
                window.location.href = `https://your-main-app-url.html?user=${email}`;
            } catch (err) {
                btn.innerText = "FINALIZE MY ACCOUNT";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
