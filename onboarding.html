<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Onboarding | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; color: #111827; }
        .input-group label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #6B7280; margin-bottom: 8px; display: block; margin-left: 4px; }
        .input-style { width: 100%; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 1.5rem; padding: 1.25rem; font-weight: 600; transition: all 0.2s; }
        .input-style:focus { outline: none; border-color: #CFB991; background: white; box-shadow: 0 0 0 4px rgba(207, 185, 145, 0.1); }
        .glass-card { background: white; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="status-overlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center flex-col">
        <div class="w-12 h-12 border-4 border-gray-100 border-t-[#CFB991] rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Authenticating</p>
    </div>

    <div id="landing-page" class="hidden w-full max-w-2xl">
        <div class="mb-12">
            <h1 class="text-5xl font-black tracking-tighter uppercase italic leading-none">Available<br><span class="text-[#CFB991] non-italic">Profiles</span></h1>
            <p class="text-gray-400 font-bold text-sm mt-4 uppercase tracking-[0.2em]">Select your profile to begin activation</p>
        </div>

        <div class="glass-card rounded-[3rem] p-8 flex items-center justify-between group hover:border-[#CFB991] transition-all duration-300">
            <div>
                <h2 id="profile-full-name" class="text-2xl font-black tracking-tight">Full Name</h2>
                <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mt-1">Summer/Fall 2026 New Hire — Tour Guide</p>
            </div>
            <button onclick="showForm()" class="bg-black text-white px-8 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-lg shadow-black/10">
                Activate Account
            </button>
        </div>
    </div>

    <div id="form-page" class="hidden w-full max-w-4xl bg-white rounded-[4rem] shadow-2xl p-10 md:p-16 border border-gray-100">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <p class="text-[#CFB991] font-black uppercase tracking-widest text-xs mb-2">Final Step</p>
                <h1 class="text-6xl font-black tracking-tighter uppercase italic leading-none">Complete<br>Profile</h1>
            </div>
            <div class="text-right">
                <p id="user-display-name" class="font-black text-xl italic uppercase tracking-tighter"></p>
                <p class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">New Hire Portal</p>
            </div>
        </header>

        <form id="onboardingForm" class="space-y-10">
            <input type="hidden" name="email" id="hidden-email">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="input-group">
                    <label>PUID (Secure ID)</label>
                    <input type="password" name="puid" required placeholder="•••••••••" class="input-style">
                </div>
                <div class="input-group">
                    <label>Official Email</label>
                    <input type="email" id="display-email" class="input-style bg-gray-50 text-gray-400" readonly>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="input-group"><label>Birthday</label><input type="date" name="birthday" required class="input-style"></div>
                <div class="input-group"><label>Hometown</label><input type="text" name="hometown" required placeholder="City, State" class="input-style"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="input-group">
                    <label>Expected Graduation</label>
                    <select name="gradDate" id="gradDate" required class="input-style"></select>
                </div>
                <div class="input-group">
                    <label>Classification</label>
                    <select name="year" required class="input-style">
                        <option>Freshman</option><option>Sophomore</option><option>Junior</option><option>Senior</option><option>5th Year/Grad</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>College (Select all that apply)</label>
                <select name="college" multiple required class="input-style h-48 py-4">
                    <option>Agriculture</option><option>Education</option><option>Engineering</option><option>Health and Human Sciences</option><option>Liberal Arts</option><option>Management</option><option>Pharmacy</option><option>Polytechnic</option><option>Science</option><option>Veterinary Medicine</option><option>Exploratory Studies</option><option>Honors College</option>
                </select>
            </div>

            <div class="input-group"><label>Primary Major</label><input type="text" name="major" required placeholder="e.g. Aeronautical Engineering" class="input-style"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="input-group"><label>Minor (Optional)</label><input type="text" name="minor" placeholder="N/A" class="input-style"></div>
                <div class="input-group"><label>Certificate (Optional)</label><input type="text" name="certificate" placeholder="N/A" class="input-style"></div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-black text-white font-black py-8 rounded-[2.5rem] shadow-2xl uppercase tracking-[0.3em] text-sm hover:bg-gray-900 transition-all active:scale-[0.98]">
                Finalize & Launch App
            </button>
        </form>
    </div>

    <script>
        const ONBOARDING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzz5RVbtLPG-pp4WY9wvW2-_RGOchvXEiKYMpMC2nW322OW3C2bo9AY3NhuCllndmDh/exec';
        const SCHOOL_DOMAIN = "@purdue.edu"; 
        const params = new URLSearchParams(window.location.search);
        const username = params.get('user');

        window.onload = async () => {
            if (!username) { alert("No user provided in URL"); return; }

            // Populate Grad Dates
            const gradSelect = document.getElementById('gradDate');
            for(let y=2024; y<=2031; y++) {
                ['Spring', 'Summer', 'Winter'].forEach(t => {
                    let opt = new Option(`${t} ${y}`, `${t} ${y}`);
                    gradSelect.add(opt);
                });
            }

            try {
                const resp = await fetch(`${ONBOARDING_SCRIPT_URL}?action=getName&username=${encodeURIComponent(username)}`);
                const data = await resp.json();

                if(data.displayName) {
                    document.getElementById('profile-full-name').innerText = data.fullName;
                    document.getElementById('user-display-name').innerText = data.displayName;
                    document.getElementById('display-email').value = username + SCHOOL_DOMAIN;
                    document.getElementById('hidden-email').value = username + SCHOOL_DOMAIN;
                    
                    document.getElementById('status-overlay').classList.add('hidden');
                    document.getElementById('landing-page').classList.remove('hidden');
                } else {
                    document.getElementById('status-overlay').innerHTML = `<p class='font-black uppercase tracking-widest text-red-500'>Username Not Found</p>`;
                }
            } catch(e) {
                console.error(e);
            }
        };

        function showForm() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('form-page').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.username = username;
            data.college = Array.from(e.target.college.selectedOptions).map(o => o.value).join(', ');

            await fetch(ONBOARDING_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            btn.innerText = "SUCCESS! OPENING TGIS...";
            setTimeout(() => { window.location.href = `https://your-main-app-url.html?user=${username}`; }, 2000);
        });
    </script>
</body>
</html>
