<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS | Account Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .input-group label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #9CA3AF; margin-bottom: 6px; display: block; margin-left: 4px; }
        .input-style { width: 100%; background: white; border: 1px solid #E5E7EB; border-radius: 1.25rem; padding: 1rem 1.25rem; font-weight: 600; transition: all 0.2s; }
        .input-style:focus { outline: none; border-color: #CFB991; box-shadow: 0 0 0 4px rgba(207, 185, 145, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="status-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center flex-col p-6 text-center">
        <div id="loader" class="w-12 h-12 border-4 border-gray-100 border-t-[#CFB991] rounded-full animate-spin mb-4"></div>
        <p id="status-message" class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Validating Identity</p>
    </div>

    <div id="main-card" class="hidden max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-gray-100">
        <header class="mb-10 text-center">
            <h1 id="user-display-name" class="text-5xl font-black tracking-tighter uppercase italic leading-none mb-4 text-black">Tour Guide</h1>
            <p class="text-gray-400 font-bold text-sm uppercase tracking-widest">Complete your secure profile</p>
        </header>

        <form id="onboardingForm" class="space-y-6">
            <input type="hidden" name="email" id="hidden-email">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>PUID (Secure)</label>
                    <input type="password" name="puid" required placeholder="•••••••••" class="input-style">
                </div>
                <div class="input-group">
                    <label>Assigned Email</label>
                    <input type="email" id="display-email" class="input-style bg-gray-50 text-gray-400" readonly>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group"><label>Birthday</label><input type="date" name="birthday" required class="input-style"></div>
                <div class="input-group"><label>Hometown</label><input type="text" name="hometown" required placeholder="City, State" class="input-style"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>Expected Graduation</label>
                    <select name="gradDate" id="gradDate" required class="input-style"></select>
                </div>
                <div class="input-group">
                    <label>Classification</label>
                    <select name="year" required class="input-style">
                        <option>Freshman</option><option>Sophomore</option><option>Junior</option><option>Senior</option><option>5th Year/Grad</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>College (Select Multiple)</label>
                <select name="college" multiple required class="input-style h-40 py-2">
                    <option>Agriculture</option><option>Education</option><option>Engineering</option><option>Health and Human Sciences</option><option>Liberal Arts</option><option>Management</option><option>Pharmacy</option><option>Polytechnic</option><option>Science</option><option>Veterinary Medicine</option><option>Exploratory Studies</option><option>Honors College</option>
                </select>
            </div>

            <div class="input-group"><label>Major</label><input type="text" name="major" required class="input-style"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group"><label>Minor (Optional)</label><input type="text" name="minor" class="input-style"></div>
                <div class="input-group"><label>Certificate (Optional)</label><input type="text" name="certificate" class="input-style"></div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-black text-white font-black py-6 rounded-[2rem] shadow-xl uppercase tracking-widest text-xs hover:bg-gray-900 transition-all">Activate Account</button>
        </form>
    </div>

    <script>
        const ONBOARDING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8yoii4E-jb5b1oHtw0B9srByNapRGGlwUlnuTSK3JjACvUrhqD2ciR-E3AuKQLDHw/exec';
        const SCHOOL_DOMAIN = "@purdue.edu"; 

        const params = new URLSearchParams(window.location.search);
        const username = params.get('user');

        window.onload = async () => {
            if (!username) {
                document.getElementById('status-message').innerText = "URL Error: Missing ?user=";
                return;
            }

            // Populate Grad Select
            const gradSelect = document.getElementById('gradDate');
            for(let y=2024; y<=2031; y++) {
                ['Spring', 'Summer', 'Winter'].forEach(t => {
                    let opt = new Option(`${t} ${y}`, `${t} ${y}`);
                    gradSelect.add(opt);
                });
            }

            try {
                // We send the raw username to Column A
                const resp = await fetch(`${ONBOARDING_SCRIPT_URL}?action=getName&username=${encodeURIComponent(username)}`);
                const data = await resp.json();

                if(data.name) {
                    document.getElementById('user-display-name').innerText = data.name;
                    document.getElementById('display-email').value = username + SCHOOL_DOMAIN;
                    document.getElementById('hidden-email').value = username + SCHOOL_DOMAIN;
                    document.getElementById('status-overlay').classList.add('hidden');
                    document.getElementById('main-card').classList.remove('hidden');
                } else {
                    document.getElementById('status-message').innerText = "Username '" + username + "' not found in TourGuides sheet.";
                    document.getElementById('loader').classList.add('hidden');
                }
            } catch(e) {
                document.getElementById('status-message').innerText = "Connection Error";
            }
        };

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "ACTIVATING..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.username = username;
            data.college = Array.from(e.target.college.selectedOptions).map(o => o.value).join(', ');

            await fetch(ONBOARDING_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            btn.innerText = "SUCCESS! REDIRECTING...";
            setTimeout(() => { window.location.href = `https://your-main-app-url.html?user=${username}`; }, 1500);
        });
    </script>
</body>
</html>
