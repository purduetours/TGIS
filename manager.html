<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Manager Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .content-area { margin-left: 18rem; transition: all 0.3s ease; min-height: 100vh; }
        @media (max-width: 1024px) { .content-area { margin-left: 0; } }
        
        .loader { border-top-color: #CFB991; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .schedule-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
        .day-column { background: white; border-radius: 1.5rem; border: 1px solid #F3F4F6; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .tour-slot { 
            height: 260px; 
            margin-bottom: 1rem; 
            padding: 0.75rem; 
            border-radius: 1rem; 
            border: 1px solid #F3F4F6; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tour-time-label { font-size: 10px; font-weight: 900; color: #CFB991; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .guide-name-pill { font-size: 11px; font-weight: 600; background: white; border: 1px solid #E5E7EB; padding: 4px 8px; border-radius: 6px; margin-bottom: 3px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .status-drop { color: #EF4444; border-color: #FEE2E2; background: #FEF2F2; }

        .bg-slot-9DV { background-color: #f0f7ff; border-color: #bae6fd; }
        .bg-slot-0DV { background-color: #fdf2f8; border-color: #fbcfe8; }
        .bg-slot-1DV { background-color: #f0fdf4; border-color: #bbf7d0; }
        .bg-slot-2DV { background-color: #fffbeb; border-color: #fef3c7; }

        @media print {
            nav, #loading-overlay, .no-print, header, #tab-control, #tab-roster, #tab-desk { display: none !important; }
            .content-area { margin-left: 0 !important; padding: 0 !important; width: 100% !important; background: white !important; }
            body { background: white !important; }
            .schedule-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 4px !important; width: 100% !important; }
            .day-column { box-shadow: none !important; border: 1px solid #eee !important; padding: 4px !important; }
            .tour-slot { height: 160px !important; margin-bottom: 4px !important; padding: 4px !important; border: 1px solid #ddd !important; border-radius: 0.5rem !important; }
            .guide-name-pill { font-size: 8.5px !important; padding: 2px 4px !important; margin-bottom: 1px !important; border: 1px solid #eee !important; }
            .tour-time-label { font-size: 8px !important; margin-bottom: 2px !important; }
            #print-header { display: block !important; margin-bottom: 15px; }
            @page { size: landscape; margin: 0.4cm; }
        }
    </style>
</head>
<body class="antialiased">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    <h2 class="font-bold text-lg text-[#CFB991] uppercase tracking-widest">Accessing TGIS Database...</h2>
</div>

<nav id="main-nav" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl border-r border-gray-100 p-6 z-40 hidden lg:flex flex-col">
    <div class="mb-8">
        <p class="text-[10px] font-black text-[#CFB991] uppercase tracking-[0.2em] mb-1">Purdue University</p>
        <h1 class="text-xl font-black leading-tight">TGIS Manager</h1>
    </div>
    <div class="space-y-2 flex-grow">
        <button onclick="switchTab('roster')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">📋 Master Roster</button>
        <button onclick="switchTab('schedule')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">📅 Tour Schedule</button>
        <button onclick="switchTab('desk')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">🖥️ Desk Dashboard</button>
        <button onclick="switchTab('control')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all text-gray-400">🕹️ Control Center</button>
    </div>
    <div class="mt-auto pt-6 border-t border-gray-100">
        <div class="bg-gray-50 rounded-2xl p-4 flex items-center gap-3">
            <div class="w-10 h-10 bg-[#CFB991] rounded-full flex items-center justify-center text-white font-black">AD</div>
            <div>
                <p class="text-xs font-black uppercase tracking-tight">Admin User</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase">Boilermaker Admin</p>
            </div>
        </div>
    </div>
</nav>

<div class="content-area">
    <div id="tab-roster" class="tab-content active p-8">
        <h1 class="text-4xl font-black mb-8">Staff Roster</h1>
        <div id="roster-table-container"></div> 
    </div>

    <div id="tab-schedule" class="tab-content p-4 lg:p-8">
        <div id="print-header" class="hidden text-center">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Postcard Signoff</h1>
            <p id="print-date-range" class="text-sm font-bold text-gray-500 uppercase tracking-widest"></p>
        </div>
        
        <header class="mb-10 flex flex-wrap justify-between items-center no-print gap-4">
            <h1 class="text-4xl font-black">Tour Schedule</h1>
            <div class="flex items-center gap-3">
                <button onclick="jumpToToday()" class="bg-green-600 text-white h-[40px] px-4 rounded-xl font-bold text-xs uppercase">Today</button>
                <div class="flex items-center bg-white border rounded-xl p-1 h-[40px]">
                    <button onclick="changeWeek(-7)" class="px-2 hover:bg-gray-100 rounded-lg">◀</button>
                    <input type="date" id="schedule-date-picker" onchange="jumpToDate(this.value)" class="mx-2 font-bold text-sm outline-none cursor-pointer">
                    <button onclick="changeWeek(7)" class="px-2 hover:bg-gray-100 rounded-lg">▶</button>
                </div>
                <button onclick="prepareAndPrint()" class="bg-black text-white h-[40px] px-6 rounded-xl font-bold text-xs uppercase">Print Postcards</button>
            </div>
        </header>
        <div id="schedule-container" class="schedule-grid"></div>
    </div>

    <div id="tab-desk" class="tab-content p-8">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
            <h1 class="text-5xl font-black uppercase tracking-tighter">Desk Ops</h1>
            <div id="status-bar" class="flex gap-3"></div>
        </div>
        <div id="desk-summary-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="tab-control" class="tab-content p-8">
        <h1 class="text-4xl font-black mb-4 uppercase">Control Center</h1>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz-RvNHk8SpTjtKt_r00cTmkH6DWtQeApayShxo9iDHsn7TyrhgQXWL2H-1ChBFfnaV/exec';
    let tourData = [];
    let currentMonday = getMonday(new Date());
    let deskDate = new Date();
    deskDate.setHours(0,0,0,0);

    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const mon = new Date(d.setDate(diff));
        mon.setHours(0,0,0,0);
        return mon;
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        if(tabName === 'schedule') { updatePicker(); renderSchedule(); }
        if(tabName === 'desk') renderDeskDashboard();
    }

    function changeWeek(days) {
        currentMonday.setDate(currentMonday.getDate() + days);
        updatePicker();
        renderSchedule();
    }

    function changeDeskDate(days) {
        deskDate.setDate(deskDate.getDate() + days);
        renderDeskDashboard();
    }

    function jumpToDate(val) {
        if(!val) return;
        currentMonday = getMonday(new Date(val.replace(/-/g, '/')));
        renderSchedule();
    }

    function jumpToToday() {
        currentMonday = getMonday(new Date());
        updatePicker();
        renderSchedule();
    }

    function updatePicker() {
        const picker = document.getElementById('schedule-date-picker');
        if(picker) picker.value = currentMonday.toISOString().split('T')[0];
    }

    function prepareAndPrint() {
        const printDateDisplay = document.getElementById('print-date-range');
        
        // Calculate the Friday of the current displayed week
        const friday = new Date(currentMonday);
        friday.setDate(currentMonday.getDate() + 4);
        
        // Calculate due date (One week after that Friday)
        const dueDate = new Date(friday);
        dueDate.setDate(friday.getDate() + 7);
        
        const weekStart = currentMonday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const weekEnd = friday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const dueStr = dueDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

        printDateDisplay.innerHTML = `Week of ${weekStart} - ${weekEnd} <span class="mx-4">|</span> <span class="text-red-600">Postcards Due: ${dueStr.toUpperCase()}</span>`;
        window.print();
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        if(!container) return;
        const slots = [
            { c: '9DV', t: '9:30 AM', cls: 'bg-slot-9DV' },
            { c: '0DV', t: '10:30 AM', cls: 'bg-slot-0DV' },
            { c: '1DV', t: '1:30 PM', cls: 'bg-slot-1DV' },
            { c: '2DV', t: '2:30 PM', cls: 'bg-slot-2DV' }
        ];
        let html = '';
        for(let i=0; i<5; i++) {
            const d = new Date(currentMonday); d.setDate(d.getDate() + i);
            html += `<div class="day-column"><div class="text-center mb-4"><h3 class="font-black uppercase text-sm">${d.toLocaleDateString('en-US',{weekday:'long'})}</h3><p class="text-[9px] font-bold text-[#CFB991]">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</p></div>`;
            slots.forEach(s => {
                const entries = tourData.filter(t => t.type === s.c && t.dateObj && t.dateObj.getTime() === d.getTime());
                const cancelled = entries.some(e => ['N/A','#N/A'].includes(String(e.guide).trim().toUpperCase()));
                
                if(cancelled) {
                    html += `<div class="tour-slot ${s.cls} opacity-50 flex items-center justify-center italic text-[10px]">No Tour</div>`;
                } else {
                    html += `<div class="tour-slot ${s.cls}"><p class="tour-time-label">${s.t}</p><div class="flex flex-col gap-1">`;
                    if(entries.length > 0) {
                        html += entries.map(e => {
                            const isSpecial = String(e.guide).includes('`');
                            const cleanName = String(e.guide).replace('`','');
                            return `<div class="guide-name-pill ${e.status==='DROP'?'status-drop':''}">
                                <span class="truncate">${cleanName}</span>
                                <span class="hidden print:inline font-mono font-bold ml-1">${isSpecial ? 'ACP' : '____'}</span>
                            </div>`;
                        }).join('');
                    } else {
                        html += '<p class="text-[8px] text-gray-400">Empty</p>';
                    }
                    html += `</div></div>`;
                }
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function renderDeskDashboard() {
        const container = document.getElementById('desk-summary-grid');
        const statusBar = document.getElementById('status-bar');
        if(!container || !statusBar) return;
        
        const slots = [
            { code: '9DV', time: '9:30 AM', h: 9, m: 30 },
            { code: '0DV', time: '10:30 AM', h: 10, m: 30 },
            { code: '1DV', time: '1:30 PM', h: 13, m: 30 },
            { code: '2DV', time: '2:30 PM', h: 14, m: 30 }
        ];

        let gridHtml = '';
        slots.forEach(slot => {
            const guides = tourData.filter(t => t.type === slot.code && t.dateObj && t.dateObj.getTime() === deskDate.getTime() && !['N/A','#N/A'].includes(String(t.guide).trim().toUpperCase()));
            gridHtml += `<div class="bg-white border-2 p-6 rounded-[2rem] shadow-sm"><p class="text-[10px] font-black text-[#CFB991] uppercase">${slot.code}</p><h2 class="text-2xl font-black mb-4">${slot.time}</h2><div class="space-y-2">${guides.length > 0 ? guides.map(g => `<div class="p-3 bg-gray-50 rounded-xl border text-sm font-bold">${String(g.guide).replace('`','')}</div>`).join('') : '<p class="text-xs italic text-gray-400">Empty</p>'}</div></div>`;
        });
        container.innerHTML = gridHtml;
    }

    async function init() {
        try {
            const resp = await fetch(scriptURL);
            const data = await resp.json();
            tourData = data.tours || [];
            tourData.forEach(t => { if(t.date) { t.dateObj = new Date(t.date); t.dateObj.setHours(0,0,0,0); }});
            updatePicker();
            renderSchedule();
        } catch(e) { console.error(e); } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    init();
</script>
</body>
</html>
