<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Manager Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .content-area { margin-left: 18rem; transition: all 0.3s ease; min-height: 100vh; }
        @media (max-width: 1024px) { .content-area { margin-left: 0; } }
        
        .loader { border-top-color: #CFB991; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .schedule-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
        .day-column { background: white; border-radius: 1.5rem; border: 1px solid #F3F4F6; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .tour-slot { height: 240px; margin-bottom: 1rem; padding: 0.6rem; border-radius: 1rem; border: 1px solid #F3F4F6; display: flex; flex-direction: column; overflow: hidden; }
        .tour-time-label { font-size: 10px; font-weight: 900; color: #CFB991; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
        .guide-name-pill { font-size: 10px; font-weight: 600; background: white; border: 1px solid #E5E7EB; padding: 3px 6px; border-radius: 6px; margin-bottom: 2px; width: 100%; display: flex; justify-content: space-between; }
        .status-drop { color: #EF4444; border-color: #FEE2E2; background: #FEF2F2; }

        .bg-slot-9DV { background-color: #f0f7ff; border-color: #bae6fd; }
        .bg-slot-0DV { background-color: #fdf2f8; border-color: #fbcfe8; }
        .bg-slot-1DV { background-color: #f0fdf4; border-color: #bbf7d0; }
        .bg-slot-2DV { background-color: #fffbeb; border-color: #fef3c7; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            nav, #loading-overlay, .no-print, header, #tab-control, #tab-roster, #tab-desk { display: none !important; }
            .content-area { margin-left: 0 !important; padding: 0 !important; width: 100% !important; background: white !important; }
            .schedule-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; width: 100% !important; gap: 4px !important; }
            .tour-slot { height: 155px !important; margin-bottom: 4px !important; padding: 3px !important; border: 1px solid #ddd !important; }
            @page { size: landscape; margin: 0.3cm; }
        }
    </style>
</head>
<body class="antialiased">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    <h2 class="font-bold text-lg text-[#CFB991] uppercase tracking-widest">Accessing TGIS Database...</h2>
</div>

<nav id="main-nav" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl border-r border-gray-100 p-6 z-40 hidden lg:flex flex-col">
    <div class="mb-8">
        <p class="text-[10px] font-black text-[#CFB991] uppercase tracking-[0.2em] mb-1">Purdue University</p>
        <h1 class="text-xl font-black leading-tight">TGIS Manager</h1>
    </div>
    <div class="space-y-2 flex-grow">
        <button onclick="switchTab('roster')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">📋 Master Roster</button>
        <button onclick="switchTab('schedule')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">📅 Tour Schedule</button>
        <button onclick="switchTab('desk')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">🖥️ Desk Dashboard</button>
        <button onclick="switchTab('control')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all text-gray-400">🕹️ Control Center</button>
    </div>
</nav>

<div class="content-area">
    <div id="tab-desk" class="tab-content active p-8">
        <header class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-5xl font-black uppercase tracking-tighter">Desk Ops</h1>
                <div class="flex items-center gap-3 bg-white p-1 rounded-2xl border shadow-sm">
                    <button onclick="changeDeskDate(-1)" class="p-2 hover:bg-gray-100 rounded-xl transition-all">◀</button>
                    <p id="desk-display-date" class="font-black text-[#CFB991] uppercase text-sm tracking-widest px-2"></p>
                    <button onclick="changeDeskDate(1)" class="p-2 hover:bg-gray-100 rounded-xl transition-all">▶</button>
                </div>
            </div>
            <div id="status-bar" class="flex gap-2 overflow-x-auto no-scrollbar pb-4 border-b border-gray-100"></div>
        </header>

        <div class="mb-10">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-4">Daily Visits</h2>
            <div id="grid-daily" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
        </div>

        <div>
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-4">Program Days</h2>
            <div id="grid-program" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <div id="tab-schedule" class="tab-content p-4 lg:p-8">
        <div id="print-header" class="hidden text-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Postcard Signoff</h1>
            <p id="print-date-range" class="text-xs font-bold text-gray-500 uppercase tracking-widest"></p>
        </div>
        <header class="mb-10 flex flex-wrap justify-between items-center no-print gap-4">
            <h1 class="text-4xl font-black">Tour Schedule</h1>
            <div class="flex items-center gap-3">
                <button onclick="jumpToToday()" class="bg-green-600 text-white h-[40px] px-4 rounded-xl font-bold text-xs uppercase">Today</button>
                <div class="flex items-center bg-white border rounded-xl p-1 h-[40px]">
                    <button onclick="changeWeek(-7)" class="px-2 hover:bg-gray-100 rounded-lg">◀</button>
                    <input type="date" id="schedule-date-picker" onchange="jumpToDate(this.value)" class="mx-2 font-bold text-sm outline-none cursor-pointer">
                    <button onclick="changeWeek(7)" class="px-2 hover:bg-gray-100 rounded-lg">▶</button>
                </div>
                <button onclick="prepareAndPrint()" class="bg-black text-white h-[40px] px-6 rounded-xl font-bold text-xs uppercase">Print Postcards</button>
            </div>
        </header>
        <div id="schedule-container" class="schedule-grid"></div>
    </div>

    <div id="tab-roster" class="tab-content p-8">
        <h1 class="text-4xl font-black mb-8">Staff Roster</h1>
        <div id="roster-table-container"></div> 
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz-RvNHk8SpTjtKt_r00cTmkH6DWtQeApayShxo9iDHsn7TyrhgQXWL2H-1ChBFfnaV/exec';
    let tourData = [];
    let currentMonday = getMonday(new Date());
    let deskDate = new Date();
    deskDate.setHours(0,0,0,0);

    const DAILY_VISITS = [
        { code: '9DV', name: '9:30 Daily', h: 9, m: 30 },
        { code: '0DV', name: '10:30 Daily', h: 10, m: 30 },
        { code: '0GV', name: '10:30 Group', h: 10, m: 30 },
        { code: '1DV', name: '1:30 Daily', h: 13, m: 30 },
        { code: '2DV', name: '2:30 Daily', h: 14, m: 30 }
    ];

    const PROGRAM_DAYS = [
        { code: '8PA', name: '8:15 Program', h: 8, m: 15 },
        { code: 'EPF.', name: '11:15 Program', h: 11, m: 15 },
        { code: '1PA', name: '1:15 Program', h: 13, m: 15 },
        { code: '1PF', name: '1:30 Program', h: 13, m: 30 },
        { code: '2PA', name: '2:15 Program', h: 14, m: 15 }
    ];

    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const mon = new Date(d.setDate(diff));
        mon.setHours(0,0,0,0);
        return mon;
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        if(tabName === 'schedule') { updatePicker(); renderSchedule(); }
        if(tabName === 'desk') renderDeskDashboard();
    }

    function changeDeskDate(days) {
        deskDate.setDate(deskDate.getDate() + days);
        renderDeskDashboard();
    }

    function changeWeek(days) {
        currentMonday.setDate(currentMonday.getDate() + days);
        updatePicker();
        renderSchedule();
    }

    function jumpToDate(val) {
        if(!val) return;
        currentMonday = getMonday(new Date(val.replace(/-/g, '/')));
        renderSchedule();
    }

    function jumpToToday() {
        currentMonday = getMonday(new Date());
        deskDate = new Date();
        deskDate.setHours(0,0,0,0);
        updatePicker();
        renderSchedule();
        renderDeskDashboard();
    }

    function updatePicker() {
        const picker = document.getElementById('schedule-date-picker');
        if(picker) picker.value = currentMonday.toISOString().split('T')[0];
    }

    function prepareAndPrint() {
        const friday = new Date(currentMonday);
        friday.setDate(currentMonday.getDate() + 4);
        const dueDate = new Date(friday);
        dueDate.setDate(friday.getDate() + 7);
        document.getElementById('print-date-range').innerHTML = `Week: ${currentMonday.toLocaleDateString()} - ${friday.toLocaleDateString()} | <span style="color:red">Due: ${dueDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase()}</span>`;
        window.print();
    }

    function createCardHtml(slot, guides, hasTour, now) {
        let statusColor = "bg-gray-100 text-gray-400";
        let statusText = "Empty";

        if(hasTour) {
            const start = new Date(deskDate); start.setHours(slot.h, slot.m, 0);
            const end = new Date(start); end.setMinutes(start.getMinutes() + 105);
            if(deskDate.toDateString() === now.toDateString()) {
                if(now >= start && now <= end) { statusColor = "bg-purple-600 text-white animate-pulse"; statusText = "Live"; }
                else if(now < start) { statusColor = "bg-green-500 text-white"; statusText = "Ready"; }
                else { statusColor = "bg-gray-400 text-white"; statusText = "Done"; }
            } else { statusColor = "bg-green-600 text-white"; statusText = "Scheduled"; }
        }

        const pillHtml = `<div class="${statusColor} px-2 py-0.5 rounded text-[9px] font-black uppercase whitespace-nowrap inline-block mb-1">${slot.code}: ${statusText}</div>`;
        
        const cardHtml = `
            <div class="bg-white border p-5 rounded-3xl shadow-sm flex flex-col ${!hasTour ? 'opacity-30' : ''}">
                <p class="text-[9px] font-black text-[#CFB991] uppercase tracking-widest">${slot.code}</p>
                <h2 class="text-xl font-black mb-3">${slot.name}</h2>
                <div class="space-y-1.5 flex-grow">
                    ${guides.length > 0 ? guides.map(g => `<div class="p-2 bg-gray-50 rounded-lg border text-[11px] font-bold">${String(g.guide).replace('`','')}</div>`).join('') : '<p class="text-[10px] italic text-gray-400">Empty</p>'}
                </div>
            </div>`;
        
        return { cardHtml, pillHtml };
    }

    function renderDeskDashboard() {
        const dailyContainer = document.getElementById('grid-daily');
        const programContainer = document.getElementById('grid-program');
        const statusBar = document.getElementById('status-bar');
        const dateLabel = document.getElementById('desk-display-date');
        if(!dailyContainer || !programContainer || !statusBar) return;
        
        dateLabel.innerText = deskDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const now = new Date();
        
        let dailyHtml = '';
        let programHtml = '';
        let statusHtml = '';

        DAILY_VISITS.forEach(slot => {
            const guides = tourData.filter(t => t.type === slot.code && t.dateObj && t.dateObj.getTime() === deskDate.getTime() && !['N/A','#N/A'].includes(String(t.guide).trim().toUpperCase()));
            const result = createCardHtml(slot, guides, guides.length > 0, now);
            dailyHtml += result.cardHtml;
            statusHtml += result.pillHtml;
        });

        PROGRAM_DAYS.forEach(slot => {
            const guides = tourData.filter(t => t.type === slot.code && t.dateObj && t.dateObj.getTime() === deskDate.getTime() && !['N/A','#N/A'].includes(String(t.guide).trim().toUpperCase()));
            const result = createCardHtml(slot, guides, guides.length > 0, now);
            programHtml += result.cardHtml;
            statusHtml += result.pillHtml;
        });

        dailyContainer.innerHTML = dailyHtml;
        programContainer.innerHTML = programHtml;
        statusBar.innerHTML = statusHtml;
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        if(!container) return;
        const slots = [{c:'9DV',t:'9:30 AM',cls:'bg-slot-9DV'},{c:'0DV',t:'10:30 AM',cls:'bg-slot-0DV'},{c:'1DV',t:'1:30 PM',cls:'bg-slot-1DV'},{c:'2DV',t:'2:30 PM',cls:'bg-slot-2DV'}];
        let html = '';
        for(let i=0; i<5; i++) {
            const d = new Date(currentMonday); d.setDate(d.getDate() + i);
            html += `<div class="day-column"><div class="text-center mb-3"><h3 class="font-black uppercase text-xs">${d.toLocaleDateString('en-US',{weekday:'long'})}</h3><p class="text-[9px] font-bold text-[#CFB991]">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</p></div>`;
            slots.forEach(s => {
                const entries = tourData.filter(t => t.type === s.c && t.dateObj && t.dateObj.getTime() === d.getTime());
                const cancelled = entries.some(e => ['N/A','#N/A'].includes(String(e.guide).trim().toUpperCase()));
                if(cancelled) {
                    html += `<div class="tour-slot ${s.cls} opacity-50 flex items-center justify-center italic text-[9px]">No Tour</div>`;
                } else {
                    html += `<div class="tour-slot ${s.cls}"><p class="tour-time-label">${s.t}</p><div class="flex flex-col gap-1">`;
                    html += entries.length > 0 ? entries.map(e => `<div class="guide-name-pill ${e.status==='DROP'?'status-drop':''}"><span>${String(e.guide).replace('`','')}</span><span class="hidden print:inline font-mono font-bold">${String(e.guide).includes('`') ? 'ACP' : '____'}</span></div>`).join('') : '<p class="text-[8px] text-gray-400">Empty</p>';
                    html += `</div></div>`;
                }
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    async function init() {
        try {
            const resp = await fetch(scriptURL);
            const data = await resp.json();
            tourData = data.tours || [];
            tourData.forEach(t => { if(t.date) { t.dateObj = new Date(t.date); t.dateObj.setHours(0,0,0,0); }});
            updatePicker();
            renderSchedule();
            renderDeskDashboard();
        } catch(e) { console.error(e); } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    init();
</script>
</body>
</html>
