<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Manager Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'primary-gold': '#CFB991',
                        'text-dark': '#374151',
                        'status-green': '#10B981',
                    }
                }
            }
        }
    </script>
    <style>
        .content-area { margin-left: 18rem; transition: all 0.3s ease; }
        @media (max-width: 1024px) { 
            .content-area { margin-left: 0; }
            #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            #sidebar.open { transform: translateX(0); display: block !important; }
        }
        .loader { border-top-color: #CFB991; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Badge Micro-Styles */
        .mini-badge { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; filter: grayscale(1); opacity: 0.2; transition: 0.3s; }
        .mini-badge.active { filter: grayscale(0); opacity: 1; box-shadow: 0 2px 4px rgba(207, 185, 145, 0.4); }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-text-dark">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    <h2 class="font-bold text-lg">Syncing Manager Data...</h2>
</div>

<nav id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl border-r border-gray-100 p-6 z-40 hidden lg:block overflow-y-auto">
    <div class="mb-8">
        <p class="text-[10px] font-black text-primary-gold uppercase tracking-[0.2em] mb-1">Purdue University</p>
        <h1 class="text-xl font-black leading-tight">Manager Portal</h1>
    </div>

    <div class="mb-8 p-4 bg-gray-50 rounded-2xl border border-gray-100">
        <div class="flex items-center space-x-3 mb-3">
            <div class="w-12 h-12 rounded-full bg-text-dark flex items-center justify-center text-white font-black text-lg">M</div>
            <div>
                <p class="font-bold leading-tight">Admin Dashboard</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Management View</p>
            </div>
        </div>
    </div>

    <div class="mb-8">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 ml-2">Controls</p>
        <div class="flex items-center p-3 bg-primary-gold text-white rounded-xl font-bold text-sm shadow-lg shadow-primary-gold/30">
            <span class="mr-3">📋</span> Guide Roster
        </div>
    </div>
</nav>

<div class="content-area p-4 sm:p-8">
    <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h1 class="text-3xl font-black">Staff Roster</h1>
            <p id="roster-count" class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Loading guides...</p>
        </div>
        
        <div class="relative w-full md:w-80">
            <input type="text" id="managerSearch" onkeyup="searchRoster()" placeholder="Search guide names..." 
                class="w-full bg-white border border-gray-200 py-3 pl-10 pr-4 rounded-2xl focus:ring-2 focus:ring-primary-gold outline-none shadow-sm transition-all">
            <span class="absolute left-3.5 top-3.5 opacity-20">🔍</span>
        </div>
    </header>

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50/50 border-b border-gray-100">
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Tour Guide</th>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Sem. Tours</th>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Total Tours</th>
                        <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Milestones</th>
                    </tr>
                </thead>
                <tbody id="roster-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzErQUn5vnP8XuOm71ukxbqtFUCCPmUnA_H5e5zyWyD2c6ruu2EZ1h0WHUmNI6kQD3V/exec';
    let rosterData = [];

    async function fetchRoster() {
        try {
            // We use a generic 'admin' call to get the full list
            const res = await fetch(`${scriptURL}?user=admin`);
            const data = await res.json();
            
            // Logic fix: Ensure we pull from the right data key
            rosterData = data.fullList || data.leaderboard || [];

            renderRoster(rosterData);
            document.getElementById('roster-count').innerText = `${rosterData.length} Guides Active`;

            // Hide loader
            document.getElementById('loading-overlay').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
        } catch (e) {
            console.error("Manager Load Error:", e);
        }
    }

    function renderRoster(guides) {
        const list = document.getElementById('roster-list');
        list.innerHTML = guides.map(g => `
            <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                <td class="p-5">
                    <div class="font-bold text-text-dark">${g.displayName}</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase">${g.status || 'Guide'}</div>
                </td>
                <td class="p-5 text-center">
                    <span class="px-3 py-1 bg-status-green/10 text-status-green font-black rounded-lg">${g.semesterTotal || 0}</span>
                </td>
                <td class="p-5 text-center font-black text-lg">${g.careerTotal || 0}</td>
                <td class="p-5">
                    <div class="flex space-x-2">
                        <div class="mini-badge bg-blue-100 ${g.careerTotal >= 50 ? 'active' : ''}" title="Bell Tower Boss">🔔</div>
                        <div class="mini-badge bg-orange-100 ${g.careerTotal >= 100 ? 'active' : ''}" title="Century Club">💯</div>
                        <div class="mini-badge bg-yellow-100 ${g.careerTotal >= 200 ? 'active' : ''}" title="Golden Guide">✨</div>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function searchRoster() {
        const term = document.getElementById('managerSearch').value.toLowerCase();
        const filtered = rosterData.filter(g => g.displayName.toLowerCase().includes(term));
        renderRoster(filtered);
    }

    fetchRoster();
</script>
</body>
</html>
