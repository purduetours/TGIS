<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Manager Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">


<style>
    body { font-family: 'Inter', sans-serif; transition: background 0.5s ease; }
    .content-area { margin-left: 18rem; transition: all 0.3s ease; min-height: 100vh; }
    @media (max-width: 1024px) { .content-area { margin-left: 0; } }
    
    body.control-mode { background-image: url('boss.png'); background-size: cover; background-position: center; background-attachment: fixed; }
    body.control-mode .content-area { margin-left: 0; } 
    body.control-mode nav { display: none; }

    .loader { border-top-color: #CFB991; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .mini-badge { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; opacity: 0.15; filter: grayscale(1); transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
    .mini-badge.active { filter: grayscale(0); opacity: 1; transform: scale(1.1); border: 1px solid rgba(207, 185, 145, 0.3); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* --- SCHEDULE GRID STYLING --- */
    .schedule-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
    .day-column { background: white; border-radius: 1.5rem; border: 1px solid #F3F4F6; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    
    /* Forced Height for Neat Grid (matches 6 guide names) */
    .tour-slot { 
        height: 260px; 
        margin-bottom: 1rem; 
        padding: 0.75rem; 
        border-radius: 1rem; 
        border: 1px solid #F3F4F6; 
        display: flex;
        flex-direction: column;
        transition: all 0.2s ease;
    }

    .tour-time-label { font-size: 10px; font-weight: 900; color: #CFB991; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .guide-name-pill { font-size: 11px; font-weight: 600; background: white; border: 1px solid #E5E7EB; padding: 4px 8px; border-radius: 6px; margin-bottom: 3px; display: inline-block; width: 100%; }
    .status-drop { color: #EF4444; border-color: #FEE2E2; background: #FEF2F2; }

    /* Time Slot Color Coding */
    .bg-slot-9DV { background-color: #f0f7ff; border-color: #bae6fd; } /* Blue */
    .bg-slot-0DV { background-color: #fdf2f8; border-color: #fbcfe8; } /* Pink */
    .bg-slot-1DV { background-color: #f0fdf4; border-color: #bbf7d0; } /* Green */
    .bg-slot-2DV { background-color: #fffbeb; border-color: #fef3c7; } /* Yellow */

    /* --- PRINT LOGIC --- */
  @media print {
    /* 1. Hide everything except the schedule */
    nav, #loading-overlay, .no-print, header button, header .flex, 
    #tab-control, #tab-roster, #main-nav { 
        display: none !important; 
    }
    
    /* 2. Reset the layout to fill the paper */
    .content-area { 
        margin-left: 0 !important; 
        padding: 0 !important; 
        width: 100% !important; 
    }
    body { 
        background: white !important; 
        overflow: visible !important; 
    }

    /* 3. Force 5 columns across the page */
    .schedule-grid { 
        display: grid !important; 
        grid-template-columns: repeat(5, 1fr) !important; 
        gap: 5px !important;
        width: 100% !important;
    }

    /* 4. Formatting the boxes for sign-in */
    .day-column { 
        box-shadow: none !important; 
        border: 1px solid #eee !important; 
        padding: 4px !important; 
    }
    .tour-slot { 
        height: 180px !important; /* Shorter to ensure all 4 rows fit on one page */
        margin-bottom: 4px !important;
        border: 1px solid #ddd !important;
    }

    /* 5. Handling Names and Initials */
    .guide-name-pill {
        display: flex !important;
        justify-content: space-between !important;
        background: transparent !important;
        border: none !important;
        border-bottom: 1px solid #eee !important;
        border-radius: 0 !important;
        padding: 0 !important;
    }

    /* 6. Show the Initials/ACP only now */
    .print-only-initials {
        display: inline-block !important;
        min-width: 40px;
        text-align: right;
        font-weight: bold;
    }

    @page { 
        size: landscape; 
        margin: 0.5cm; 
    }
}

    /* Hide scrollbars but keep the container functional */
.flex.flex-col.gap-1.overflow-y-auto {
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none;  /* IE and Edge */
}

.flex.flex-col.gap-1.overflow-y-auto::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
}

/* Ensure the tour-slot itself doesn't show a scrollbar if content overflows */
.tour-slot {
    overflow: hidden !important;
}
</style>


    
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    <h2 class="font-bold text-lg text-[#CFB991] uppercase tracking-widest">Accessing TGIS Database...</h2>
</div>

<nav id="main-nav" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl border-r border-gray-100 p-6 z-40 hidden lg:block">
    <div class="mb-8">
        <p class="text-[10px] font-black text-[#CFB991] uppercase tracking-[0.2em] mb-1">Purdue University</p>
        <h1 class="text-xl font-black leading-tight">TGIS Manager</h1>
    </div>

    <div class="space-y-2">
        <button onclick="switchTab('roster')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">📋</span> Master Roster
        </button>
        <button onclick="switchTab('schedule')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">📅</span> Tour Schedule
        </button>
        <button onclick="switchTab('control')" class="w-full flex items-center p-3 hover:bg-gray-50 text-gray-600 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">🕹️</span> Control Center
        </button>
    </div>
</nav>

<div class="content-area">
    <div id="tab-roster" class="tab-content active p-4 sm:p-8">
        <h1 class="text-4xl font-black mb-8">Staff Roster</h1>
        <div id="roster-table-container"></div> </div>

<div id="tab-schedule" class="tab-content p-4 sm:p-8">
   <header class="mb-10 flex flex-col md:flex-row md:items-stretch justify-between gap-4 no-print">
    <div>
        <h1 class="text-4xl font-black text-gray-900 tracking-tight">Tour Schedule</h1>
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Live Weekly Calendar</p>
    </div>
    
    <div class="flex items-center gap-3">
        <button onclick="jumpToToday()" class="bg-green-600 hover:bg-green-700 text-white h-[46px] px-6 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-md">
            Today
        </button>

        <div class="flex items-center bg-white border border-gray-200 rounded-2xl p-1 shadow-sm h-[46px]">
            <button onclick="changeWeek(-7)" class="p-2 hover:bg-gray-50 rounded-xl">◀</button>
            <input type="date" id="schedule-date-picker" onchange="jumpToDate(this.value)" 
                   class="mx-2 font-bold text-sm outline-none bg-transparent cursor-pointer">
            <button onclick="changeWeek(7)" class="p-2 hover:bg-gray-50 rounded-xl">▶</button>
        </div>

        <button onclick="window.print()" class="bg-gray-900 hover:bg-black text-white h-[46px] px-6 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-md">
            Print Postcards
        </button>
    </div>
</header>

    <div id="schedule-container" class="schedule-grid">
        </div>
</div>

    <div id="tab-control" class="tab-content h-screen w-full flex flex-col items-center justify-center text-white relative">
        <button onclick="switchTab('roster')" class="absolute top-8 right-8 bg-white/10 px-6 py-2 rounded-full font-black uppercase tracking-widest">✕ Exit Control</button>
        <h1 class="text-6xl font-black mb-4">CONTROL CENTER</h1>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz-RvNHk8SpTjtKt_r00cTmkH6DWtQeApayShxo9iDHsn7TyrhgQXWL2H-1ChBFfnaV/exec';
    let tourData = [];
    let rawData = [];
    let currentMonday = getMonday(new Date());

    // Helper to find the Monday of whatever week is selected
    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const monday = new Date(d.setDate(diff));
        monday.setHours(0,0,0,0);
        return monday;
    }

    function changeWeek(days) {
        currentMonday.setDate(currentMonday.getDate() + days);
        updateDatePickerDisplay();
        renderSchedule();
    }

    function jumpToDate(dateStr) {
        if(!dateStr) return;
        // Replace hyphens with slashes to prevent timezone shifting on some browsers
        currentMonday = getMonday(new Date(dateStr.replace(/-/g, '\/')));
        renderSchedule();
    }

    function updateDatePickerDisplay() {
        const picker = document.getElementById('schedule-date-picker');
        if(picker) picker.value = currentMonday.toISOString().split('T')[0];
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        document.body.classList.toggle('control-mode', tabName === 'control');
        
        if(tabName === 'schedule') {
            updateDatePickerDisplay();
            renderSchedule();
        }
    }

    async function init() {
        const overlay = document.getElementById('loading-overlay');
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            rawData = data.roster || [];
            tourData = data.tours || [];
            
            // Clean up dates from the Google Sheet
            tourData.forEach(t => {
                if (t.date) {
                    t.dateObj = new Date(t.date);
                    t.dateObj.setHours(0,0,0,0);
                }
            });

            // Optional: Render roster if the container exists
            // renderRoster(rawData); 

            updateDatePickerDisplay();
        } catch (e) { 
            console.error("TGIS Init Error:", e);
        } finally {
            // This hides the loader even if the fetch fails
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.style.display = 'none', 500);
        }
    }

    function jumpToToday() {
    currentMonday = getMonday(new Date());
    updateDatePickerDisplay();
    renderSchedule();
}

function renderSchedule() {
    const container = document.getElementById('schedule-container');
    if(!container) return;

    const slots = [
        { code: '9DV', time: '9:30 AM', color: 'bg-slot-9DV' },
        { code: '0DV', time: '10:30 AM', color: 'bg-slot-0DV' },
        { code: '1DV', time: '1:30 PM', color: 'bg-slot-1DV' },
        { code: '2DV', time: '2:30 PM', color: 'bg-slot-2DV' }
    ];

    let html = '';

    for (let i = 0; i < 5; i++) {
        const workDate = new Date(currentMonday);
        workDate.setDate(currentMonday.getDate() + i);
        workDate.setHours(0,0,0,0);
        
        const dateString = workDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const dayName = workDate.toLocaleDateString('en-US', { weekday: 'long' });

        html += `
            <div class="day-column flex flex-col gap-2">
                <div class="text-center mb-1">
                    <h3 class="font-black text-gray-900 uppercase tracking-tighter leading-none text-sm">${dayName}</h3>
                    <span class="text-[9px] font-bold text-[#CFB991] uppercase">${dateString}</span>
                </div>
                ${slots.map(slot => {
                    const entriesInSlot = tourData.filter(t => {
                        return t.type === slot.code && 
                               t.dateObj && 
                               t.dateObj.getTime() === workDate.getTime();
                    });

                    const isCancelled = entriesInSlot.some(g => {
                        const val = String(g.guide).trim().toUpperCase();
                        return val === 'N/A' || val === '#N/A';
                    });

                    if (isCancelled) {
                        return `
                            <div class="tour-slot ${slot.color} opacity-60 border-dashed items-center justify-center">
                                <p class="tour-time-label">${slot.time}</p>
                                <span class="text-[9px] text-gray-500 font-extrabold italic uppercase text-center">No Tour Active</span>
                            </div>
                        `;
                    }

                    return `
                        <div class="tour-slot ${slot.color}">
                            <p class="tour-time-label">${slot.time}</p>
                            <div class="flex flex-col gap-1 overflow-hidden h-full">
                                ${entriesInSlot.length > 0 ? entriesInSlot.map(g => {
                                    const isSpecial = String(g.guide).includes('`');
                                    const cleanName = String(g.guide).replace('`', '');
                                    const initialText = isSpecial ? 'ACP' : '_______';

                                    return `
                                        <div class="guide-name-pill ${g.status === 'DROP' ? 'status-drop' : ''} flex justify-between items-center px-2">
                                            <span class="truncate pr-1 text-[10px]">${cleanName} ${g.status === 'DROP' ? '⚠️' : ''}</span>
                                            <span class="print-only-initials text-[9px] font-mono font-bold">${initialText}</span>
                                        </div>
                                    `;
                                }).join('') : '<span class="text-[8px] text-gray-400 italic text-center py-1">No guides assigned</span>'}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }
    container.innerHTML = html;
}
    // Launch!
    init();
</script>
</body>
</html>
