<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGIS Manager Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.5s ease; }
        .content-area { margin-left: 18rem; transition: all 0.3s ease; min-height: 100vh; }
        @media (max-width: 1024px) { .content-area { margin-left: 0; } }
        
        body.control-mode { background-image: url('boss.png'); background-size: cover; background-position: center; background-attachment: fixed; }
        body.control-mode .content-area { margin-left: 0; } 
        body.control-mode nav { display: none; }

        .loader { border-top-color: #CFB991; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- SCHEDULE GRID STYLING --- */
        .schedule-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
        .day-column { background: white; border-radius: 1.5rem; border: 1px solid #F3F4F6; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .tour-slot { 
            height: 260px; 
            margin-bottom: 1rem; 
            padding: 0.75rem; 
            border-radius: 1rem; 
            border: 1px solid #F3F4F6; 
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .tour-time-label { font-size: 10px; font-weight: 900; color: #CFB991; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .guide-name-pill { font-size: 11px; font-weight: 600; background: white; border: 1px solid #E5E7EB; padding: 4px 8px; border-radius: 6px; margin-bottom: 3px; display: inline-block; width: 100%; }
        .status-drop { color: #EF4444; border-color: #FEE2E2; background: #FEF2F2; }

        .bg-slot-9DV { background-color: #f0f7ff; border-color: #bae6fd; }
        .bg-slot-0DV { background-color: #fdf2f8; border-color: #fbcfe8; }
        .bg-slot-1DV { background-color: #f0fdf4; border-color: #bbf7d0; }
        .bg-slot-2DV { background-color: #fffbeb; border-color: #fef3c7; }

        @media print {
            nav, #loading-overlay, .no-print, header, #tab-control, #tab-roster { display: none !important; }
            .content-area { margin-left: 0 !important; padding: 0 !important; width: 100% !important; }
            body { background: white !important; }
            .schedule-grid { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 4px !important; width: 100% !important; }
            .day-column { box-shadow: none !important; border: 1px solid #e5e7eb !important; padding: 4px !important; break-inside: avoid; }
            .tour-slot { height: 165px !important; margin-bottom: 4px !important; padding: 4px !important; border: 1px solid #ddd !important; }
            .guide-name-pill { margin-bottom: 1px !important; padding: 1px 4px !important; font-size: 9px !important; }
            @page { size: landscape; margin: 0.5cm; }
        }

        .flex.flex-col.gap-1.overflow-y-auto { scrollbar-width: none; -ms-overflow-style: none; }
        .flex.flex-col.gap-1.overflow-y-auto::-webkit-scrollbar { display: none; }
        .tour-slot { overflow: hidden !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    <h2 class="font-bold text-lg text-[#CFB991] uppercase tracking-widest">Accessing TGIS Database...</h2>
</div>

<nav id="main-nav" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl border-r border-gray-100 p-6 z-40 hidden lg:block">
    <div class="mb-8">
        <p class="text-[10px] font-black text-[#CFB991] uppercase tracking-[0.2em] mb-1">Purdue University</p>
        <h1 class="text-xl font-black leading-tight">TGIS Manager</h1>
    </div>
    <div class="space-y-2">
        <button onclick="switchTab('roster')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">📋</span> Master Roster
        </button>
        <button onclick="switchTab('schedule')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">📅</span> Tour Schedule
        </button>
        <button onclick="switchTab('control')" class="w-full flex items-center p-3 hover:bg-gray-50 text-gray-600 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">🕹️</span> Control Center
        </button>
        <button onclick="switchTab('desk')" class="w-full flex items-center p-3 hover:bg-gray-50 rounded-xl font-bold text-sm transition-all">
            <span class="mr-3 text-lg">🖥️</span> Desk Dashboard
        </button>
    </div>
</nav>

<div class="content-area">
    <div id="tab-roster" class="tab-content active p-4 sm:p-8">
        <h1 class="text-4xl font-black mb-8">Staff Roster</h1>
        <div id="roster-table-container"></div> 
    </div>

    <div id="tab-schedule" class="tab-content p-4 sm:p-8">
        <div id="print-header" class="hidden print:block text-center mb-4">
            <h1 class="text-3xl font-black uppercase tracking-tight">Postcard Sign Off</h1>
            <p id="print-date-range" class="text-sm font-bold text-gray-600 uppercase tracking-widest"></p>
        </div>
        <header class="mb-10 flex flex-col md:flex-row md:items-stretch justify-between gap-4 no-print">
            <div>
                <h1 class="text-4xl font-black text-gray-900 tracking-tight">Tour Schedule</h1>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Live Weekly Calendar</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="jumpToToday()" class="bg-green-600 hover:bg-green-700 text-white h-[46px] px-6 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-md">Today</button>
                <div class="flex items-center bg-white border border-gray-200 rounded-2xl p-1 shadow-sm h-[46px]">
                    <button onclick="changeWeek(-7)" class="p-2 hover:bg-gray-50 rounded-xl">◀</button>
                    <input type="date" id="schedule-date-picker" onchange="jumpToDate(this.value)" class="mx-2 font-bold text-sm outline-none bg-transparent cursor-pointer">
                    <button onclick="changeWeek(7)" class="p-2 hover:bg-gray-50 rounded-xl">▶</button>
                </div>
                <button onclick="prepareAndPrint()" class="bg-gray-900 hover:bg-black text-white h-[46px] px-6 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-md">Print Postcards</button>
            </div>
        </header>
        <div id="schedule-container" class="schedule-grid"></div>
    </div>

    <div id="tab-control" class="tab-content h-screen w-full flex flex-col items-center justify-center text-white relative">
        <button onclick="
